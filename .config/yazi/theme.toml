[flavor]
use = "gruvbox-dark"

[filetype]
rules = [
  { mime = "image/*", fg = "yellow" },
  { mime = "video/*", fg = "magenta" },
  { mime = "audio/*", fg = "magenta" },
  { mime = "application/zip", fg = "red" },
]

[status]
separator_open = ""
separator_close = ""

[manager]
border_style = { fg = "yellow" }  # Gruvbox yellow borders
