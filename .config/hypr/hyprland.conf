# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor = DP-1, 2560x1440@165, 3440x0, 1
monitor = DP-2, 3440x1440@144, 0x0, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = ~/.config/rofi/launchers/type-6/launcher.sh


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar & librewolf
exec-once = awww-daemon
exec-once = sleep 1 && awww img -o DP-1 $HOME/Pictures/Wallpapers/wallhaven-rrxrl1.png
exec-once = sleep 1 && awww img -o DP-2 $HOME/Pictures/Wallpapers/9834488-1437996971.jpg

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = XCURSOR_PATH,/usr/share/icons:~/.local/share/icons
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

#Authentication Agent
exec-once = systemctl --user start hyprpolkitagent

#Notification Daemon
exec-once = mako

#Clipboard Stuff
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(7c8f8fff)  # Muted gray-cyan
    col.inactive_border = rgba(3c3836aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 1
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
   bezier = ease, 	     0.25, 0.1, 0.25, 1.0
   bezier = overshot,        0.13, 0.99,0.29, 1.05
   bezier = gnomed,          0,    0.85,   0.3,    1


    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = windows,       1,     5,     overshot,     gnomed
    animation = windowsOut,    1,     5,     ease,         slide bottom
    animation = windowsMove,   1,     5,     overshot,     slide

    animation = layers,        1,     5,     ease,         gnomed
    animation = fade,          1,     3,     ease
    animation = border,        1,     2,     ease
    animation = workspaces,    1,     5,     overshot,     slide
   }

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    repeat_delay = 110
    repeat_rate = 115
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Opening Applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, B, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, E, exec, kitty nvim
bind = $mainMod Shift, E, exec, featherpad 
bind = $mainMod, K, exec, kicad
bind = $mainMod, N, exec, qutebrowser
bind = $mainMod Shift, N, exec, librewolf
bind = $mainMod, L, exec, libreoffice
bind = $mainMod, H, exec, shotwell
bind = $mainMod, O, exec, obs
bind = $mainMod, I, exec, equibop
bind = $mainMod, A, exec, steam
bind = $mainMod, Z, exec, teams-for-linux
bind = $mainMod Shift, Z, exec, zoom
bind = $mainMod, P, exec, spotify
bind = $mainMod, U, exec, usenti
bind = $mainMod, Comma, exec, visualboyadvance-m            #GBA Emulator
bind = $mainMod Shift, Comma, exec, mgba-qt                 #Second GBA Emulator
bind = $mainMod, Period, exec, dolphin-emu                  #GC+WII Emulator
bind = $mainMod, Slash, exec, snes9x-gtk                    #SNES Emulator
bind = $mainMod, Backspace, exec, ares                      #N64 Emulator
bind = $mainMod, Backslash, exec, fceux                     #NES Emulator
bind = $mainMod, Semicolon, exec, desmume                   #DS Emulator
bind = $mainMod, Equal, exec, kalgebra
bind = $mainMod, Apostrophe, exec, slack
bind = $mainMod, Bracketleft, exec, flips
bind = $mainMod, Bracketright, exec, kdenlive 
bind = $mainMod, F12, exec, faugus-launcher
bind = Alt, V, exec, kitty cava
bind = Alt, Backspace, exec, kitty btop
bind = Alt, Backslash, exec, kitty wiremix
bind = Alt, Pause, exec, kitty cmatrix
bind = Alt, Insert, exec, kitty peaclock
bind = Alt, Page_up, exec, kitty pipes-rs
bind = Alt, E, exec, kitty vim
bind = Alt, B, exec, kitty yazi
bind = Alt, C, exec, kitty calcurse
bind = Alt, L, exec, kitty lazygit

#Neovim env
env = PATH,$HOME/.local/share/bob/nvim-bin:$HOME/.cargo/bin:$PATH

#QT Stuff
env = QT_QPA_PLATFORMTHEME,qt6ct


# Select area → annotate in Swappy → save to Screenshots with timestamp
bind = SUPER, S, exec, grim -g "$(slurp)" - | swappy -f - -o "$HOME/Pictures/Screenshots/screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png"

# Fullscreen → save straight away
bind = ALT, P, exec, grim "$HOME/Pictures/Screenshots/screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png"

# Select area → copy to clipboard (no file)
bind = SUPER, C, exec, grim -g "$(slurp)" - | wl-copy

#Power and Printer Controls
bind = SUPER, End, exec, systemctl poweroff        # Shutdown
bind = SUPER, Delete, exec, systemctl reboot             # Reboot
bind = SUPER, Home, exit                         # Logout of Hyprland
bind = SUPER, Page_down, exec, systemctl suspend		# Sleep
bind = SUPER, Page_up, exec, system-config-printer
bind = SUPER_SHIFT, SPACE, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1200 1100 && hyprctl dispatch centerwindow

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = ALT, Tab, cyclenext

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, T, togglespecialworkspace, magic
bind = $mainMod SHIFT, T, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################monitor = DP-2, 3440x1440@144, 0x0, 1


# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

#For nmtui
windowrule {
    name = nmtui-float
    match:class = floating
    
    float = true
    size = 800 600
    center = true
}
